name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Deterministic data check: runs the production CSV parser against the
      # bundled curriculum and asserts all 21 invariants (14 weeks, 4 modules,
      # forward-fill integrity, stable content-derived ids, ...).
      - name: Verify curriculum parser
        run: npm run parser:check

      - name: Build
        run: npm run build
