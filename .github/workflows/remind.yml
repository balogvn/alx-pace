name: Weekly reminders

on:
  schedule:
    # Mondays 07:00 UTC = 08:00 West Africa Time (no DST).
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web-push
        run: npm install --no-save --no-fund --no-audit web-push

      - name: Send weekly push reminders
        run: node scripts/send-reminders.mjs
        env:
          PUSH_ENDPOINT: ${{ secrets.PUSH_ENDPOINT }}
          PUSH_SENDER_TOKEN: ${{ secrets.PUSH_SENDER_TOKEN }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
